<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Молочна Ферма | Облік Виробництва</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #f1f5f9;
    }
  </style>
</head>
<body class="p-2 sm:p-4 text-slate-800">

  <header class="bg-white rounded-2xl p-4 shadow-sm mb-4 flex flex-col sm:flex-row items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="bg-emerald-500 text-white p-2.5 rounded-xl text-xl">🥛</div>
      <div>
        <h1 class="font-extrabold text-lg sm:text-xl text-slate-900 leading-tight">Клен-Ферма</h1>
        <p class="text-xs text-slate-500">Система керування цехом обробки</p>
      </div>
    </div>
    
    <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
      <div id="user-info" class="hidden text-right">
        <span id="user-email" class="text-sm font-semibold text-slate-700 block"></span>
        <button onclick="handleLogout()" class="text-xs text-red-500 hover:underline">Вийти</button>
      </div>
      
      <div id="g_id_onload"
           data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
    </div>
  </header>

  <main id="main-content" class="opacity-50 pointer-events-none transition-opacity duration-300 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-4">
    
    <section class="lg:col-span-5 bg-white p-5 rounded-2xl shadow-sm h-fit">
      <h2 class="text-base font-bold text-slate-900 mb-4 flex items-center gap-2 border-b pb-2">
        <span>🚀 Запуск нової обробки</span>
      </h2>
      
      <form id="start-process-form" onsubmit="submitStartProcess(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Продукт + Локація (Зі Складу)</label>
          <select id="form-stock-item" onchange="updateAvailableUnits()" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500">
            <option value="">-- Оберіть сировину --</option>
          </select>
        </div>
        
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Кількість для списання</label>
          <div class="relative">
            <input type="number" id="form-qty" step="any" min="0.001" required placeholder="0.00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500">
            <span id="form-unit" class="absolute right-3 top-2.5 text-sm font-semibold text-slate-400"> од </span>
          </div>
          <span id="form-stock-hint" class="text-xs text-slate-400 mt-1 block"></span>
        </div>
        
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Технологічний Процес (Вільні)</label>
          <select id="form-process" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500">
            <option value="">-- Оберіть вільний процес --</option>
          </select>
        </div>
        
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition text-sm flex items-center justify-center gap-2">
          <span>▶ Запустити в обробку</span>
        </button>
      </form>
    </section>

    <section class="lg:col-span-7 bg-white p-5 rounded-2xl shadow-sm">
      <h2 class="text-base font-bold text-slate-900 mb-4 flex items-center justify-between border-b pb-2">
        <span>⚙️ Активні процеси в цеху</span>
        <button onclick="loadData()" class="text-xs bg-slate-100 hover:bg-slate-200 px-2.5 py-1 rounded-lg text-slate-600 transition">🔄 Оновити дані</button>
      </h2>
      
      <div id="active-processes-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <p class="text-slate-400 text-sm italic col-span-2 py-4 text-center">Завантаження або немає активних процесів...</p>
      </div>
    </section>
  </main>

  <div id="end-process-modal" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-5 shadow-xl animate-in fade-in zoom-in-95 duration-150">
      <div class="flex items-center justify-between border-b pb-3 mb-4">
        <h3 class="font-bold text-base text-slate-900">🏁 Завершення процесу: <span id="modal-process-title" class="text-emerald-600"></span></h3>
        <button onclick="closeModal()" class="text-slate-400 text-lg hover:text-slate-600">&times;</button>
      </div>
      
      <form id="end-process-form" onsubmit="submitEndProcess(event)" class="space-y-4">
        <input type="hidden" id="modal-process-name">
        
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Продукт на виході (згідно з матрицею)</label>
          <select id="modal-output-product" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500">
            </select>
        </div>
        
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Фактичний вихід (кількість)</label>
          <input type="number" id="modal-output-qty" step="any" min="0.001" required placeholder="0.00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500">
        </div>
        
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Нове місце на Складі</label>
          <select id="modal-new-location" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500">
            <option value="Склад">Склад</option>
            <option value="Холодильник">Холодильник</option>
            <option value="Цех дозрівання">Цех дозрівання</option>
            <option value="Готова продукція">Готова продукція</option>
          </select>
        </div>
        
        <div class="flex gap-2 pt-2">
          <button type="button" onclick="closeModal()" class="w-1/2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-xl text-sm transition">Скасувати</button>
          <button type="submit" class="w-1/2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-md transition">Підтвердити</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // URL вашого Web App розгорнутого в Google Apps Script
    const API_URL = "https://script.google.com/macros/s/AKfycbxqyTc6LafZK9n4zKK0ht7m4i_vruALoy8VZfd-BgVQkkONfk9AdF9T-sm6E0cnt9KC/exec"; 

    // Глобальний стан додатку
    let appState = {
      idToken: null,
      stock: [],
      processes: []
    };

    // --- Авторизація ---
    function handleCredentialResponse(response) {
      appState.idToken = response.credential;
      
      // Декодуємо JWT токен базовим способом для відображення email на фронті
      try {
        const base64Url = appState.idToken.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('0' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        
        const payload = JSON.parse(jsonPayload);
        document.getElementById('user-email').innerText = payload.email;
        document.getElementById('user-info').classList.remove('hidden');
        document.querySelector('.g_id_signin').classList.add('hidden');
        
        // Активуємо інтерфейс
        const main = document.getElementById('main-content');
        main.classList.remove('opacity-50', 'pointer-events-none');
        
        // Завантажуємо дані
        loadData();
      } catch (e) {
        alert("Помилка обробки авторизації.");
      }
    }

    function handleLogout() {
      appState.idToken = null;
      document.getElementById('user-info').classList.add('hidden');
      document.querySelector('.g_id_signin').classList.remove('hidden');
      document.getElementById('main-content').classList.add('opacity-50', 'pointer-events-none');
    }

    // --- Робота з API ---
    async function callAPI(action, payload = {}) {
      // Показуємо статус завантаження (спрощено)
      payload.action = action;
      payload.idToken = appState.idToken;
      
      try {
        // Оскільки GAS Web App підтримує POST (CORS), використовуємо метод POST
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if(!result.success) {
          throw new Error(result.error || "Невідома помилка сервера");
        }
        return result;
      } catch (error) {
        alert("🚨 Помилка: " + error.message);
        throw error;
      }
    }

    // Завантаження даних з таблиць
    async function loadData() {
      try {
        const res = await callAPI('getInitialData');
        appState.stock = res.data.stock;
        appState.processes = res.data.processes;
        
        renderFormDropdowns();
        renderActiveProcesses();
      } catch(e) { console.error(e); }
    }

    // Оновлення випадаючих списків у формі
    function renderFormDropdowns() {
      const stockSelect = document.getElementById('form-stock-item');
      stockSelect.innerHTML = '<option value="">-- Оберіть сировину --</option>';
      
      appState.stock.forEach((item, index) => {
        if (item.qty > 0) {
          const opt = document.createElement('option');
          opt.value = index; // зберігаємо індекс об'єкта
          opt.innerText = `${item.name} | [${item.location}] (${item.qty} ${item.unit})`;
          stockSelect.appendChild(opt);
        }
      });

      const processSelect = document.getElementById('form-process');
      processSelect.innerHTML = '<option value="">-- Оберіть вільний процес --</option>';
      
      appState.processes.forEach(proc => {
        // Показуємо лише ті процеси, які зараз вільні (К-ть === 0)
        if (proc.qty === 0) {
          const opt = document.createElement('option');
          opt.value = proc.name;
          opt.innerText = proc.name;
          processSelect.appendChild(opt);
        }
      });
      
      updateAvailableUnits();
    }

    // Відображення підказки одиниць виміру при виборі сировини
    function updateAvailableUnits() {
      const stockSelect = document.getElementById('form-stock-item');
      const unitSpan = document.getElementById('form-unit');
      const hintSpan = document.getElementById('form-stock-hint');
      
      if(stockSelect.value !== "") {
        const item = appState.stock[stockSelect.value];
        unitSpan.innerText = item.unit;
        hintSpan.innerText = `Доступно на складі: ${item.qty} ${item.unit}`;
        document.getElementById('form-qty').max = item.qty;
      } else {
        unitSpan.innerText = "од";
        hintSpan.innerText = "";
      }
    }

    // Відображення активних процесів у вигляді карток
    function renderActiveProcesses() {
      const container = document.getElementById('active-processes-container');
      container.innerHTML = "";
      
      const active = appState.processes.filter(p => p.qty > 0);
      
      if(active.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-sm italic col-span-2 py-4 text-center">У цеху зараз немає запущених обробок.</p>';
        return;
      }
      
      active.forEach(proc => {
        const card = document.createElement('div');
        card.className = "bg-slate-50 border border-slate-200 rounded-xl p-4 flex flex-col justify-between shadow-xs";
        card.innerHTML = `
          <div>
            <div class="flex items-center justify-between mb-1">
              <span class="text-xs font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-md">В обробці</span>
              <span class="text-[11px] text-slate-400 font-mono">${proc.date}</span>
            </div>
            <h3 class="font-bold text-slate-900 text-base mb-2">${proc.name}</h3>
            <p class="text-xs text-slate-600 mb-1"><b>Сировина:</b> ${proc.inputProduct}</p>
            <p class="text-xs text-slate-600 mb-3"><b>Кількість:</b> ${proc.qty} ${proc.unit}</p>
          </div>
          <button onclick="openEndProcessModal('${proc.name}')" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 rounded-lg text-xs transition mt-2">
            🏁 Завершити процес
          </button>
        `;
        container.appendChild(card);
      });
    }

    // --- Сценарій А: Відправка запуску ---
    async function submitStartProcess(e) {
      e.preventDefault();
      if (!appState.idToken) return alert("Спочатку авторизуйтесь через Google!");
      
      const stockIdx = document.getElementById('form-stock-item').value;
      const qty = document.getElementById('form-qty').value;
      const processName = document.getElementById('form-process').value;
      
      if(!stockIdx || !qty || !processName) return;
      
      const item = appState.stock[stockIdx];
      
      const payload = {
        productName: item.name,
        location: item.location,
        qty: Number(qty),
        processName: processName
      };
      
      // Виклик API
      try {
        await callAPI('startProcessing', payload);
        document.getElementById('start-process-form').reset();
        await loadData(); // перезавантаження
        alert("✅ Процес успішно запущено!");
      } catch(err) {}
    }

    // --- Сценарій Б: Вікно завершення ---
    function openEndProcessModal(processName) {
      const proc = appState.processes.find(p => p.name === processName);
      if(!proc) return;
      
      document.getElementById('modal-process-title').innerText = proc.name;
      document.getElementById('modal-process-name').value = proc.name;
      
      // Наповнюємо випадаючий список варіантами виходу (стовпчик F з сплітом по ";")
      const outSelect = document.getElementById('modal-output-product');
      outSelect.innerHTML = "";
      
      if(proc.outputOptions.length > 0 && proc.outputOptions[0] !== "") {
        proc.outputOptions.forEach(prod => {
          const opt = document.createElement('option');
          opt.value = prod;
          opt.innerText = prod;
          outSelect.appendChild(opt);
        });
      } else {
        // Якщо матриця пуста, дозволяємо вийти тому самому продукту
        const opt = document.createElement('option');
        opt.value = proc.inputProduct;
        opt.innerText = proc.inputProduct;
        outSelect.appendChild(opt);
      }
      
      document.getElementById('modal-output-qty').value = proc.qty; // Передзаповнюємо тією ж кількістю
      document.getElementById('end-process-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('end-process-modal').classList.add('hidden');
    }

    async function submitEndProcess(e) {
      e.preventDefault();
      if (!appState.idToken) return alert("Сесія застаріла. Переавторизуйтесь!");
      
      const processName = document.getElementById('modal-process-name').value;
      const finalProduct = document.getElementById('modal-output-product').value;
      const finalQty = document.getElementById('modal-output-qty').value;
      const newLocation = document.getElementById('modal-new-location').value;
      
      const payload = {
        processName: processName,
        finalProduct: finalProduct,
        finalQty: Number(finalQty),
        newLocation: newLocation
      };
      
      try {
        await callAPI('endProcessing', payload);
        closeModal();
        await loadData();
        alert("✅ Операція завершення збережена!");
      } catch(err) {}
    }
  </script>
</body>
</html>
