<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Молочна Ферма</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
  .loader-overlay { position:fixed; inset:0; background:rgba(15,23,42,0.75); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .spinner { width:56px; height:56px; border:5px solid #ffffff33; border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .step-badge { min-width:2rem; height:2rem; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { opacity:1; }
  .info-process-spinner { animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="min-h-screen">

<!-- ════ LOADER ════ -->
<div id="loader" class="loader-overlay hidden">
  <div class="spinner mb-4"></div>
  <p class="text-white text-lg font-semibold tracking-wide">Завантаження...</p>
</div>

<!-- ════ HEADER ════ -->
<header class="bg-green-700 text-white px-4 py-3 flex items-center gap-3 shadow-md sticky top-0 z-50">
  <button id="btnHome" class="text-2xl leading-none" title="Головна">🏠</button>
  <div>
    <p class="text-xs opacity-75 uppercase tracking-wider">Молочна Ферма</p>
    <p id="headerTitle" class="text-base font-bold leading-tight">Головне меню</p>
  </div>
</header>

<!-- ════ SCREENS ════ -->
<main class="max-w-2xl mx-auto px-3 py-5 pb-24">

  <!-- START SCREEN -->
  <div id="screenStart">
    <section id="inProgressSection" class="hidden mb-6">
      <h2 class="text-sm font-bold uppercase text-orange-600 tracking-widest mb-2">⏳ Процеси в роботі</h2>
      <div id="inProgressList" class="flex flex-col gap-3"></div>
    </section>
    <section>
      <h2 class="text-sm font-bold uppercase text-green-700 tracking-widest mb-2">📋 Всі процеси</h2>
      <div id="allProcessesList" class="flex flex-col gap-3"></div>
    </section>
  </div>

  <!-- STEP SCREEN -->
  <div id="screenStep" class="hidden">
    <div id="stepProgressBar" class="flex gap-1 mb-5 flex-wrap"></div>
    <div id="stepContent" class="flex flex-col gap-4"></div>
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-3 flex gap-3 max-w-2xl mx-auto">
      <button id="btnBack" class="flex-1 py-4 rounded-xl bg-gray-200 text-gray-700 font-bold text-lg active:scale-95 transition-transform">← Назад</button>
      <button id="btnNext" class="flex-2 flex-grow-[2] py-4 rounded-xl bg-green-600 text-white font-bold text-lg active:scale-95 transition-transform shadow-md">Далі →</button>
    </div>
  </div>

  <!-- DONE SCREEN -->
  <div id="screenDone" class="hidden text-center py-12">
    <div class="text-7xl mb-4">✅</div>
    <h2 class="text-2xl font-bold text-green-700 mb-2">Процес завершено!</h2>
    <p id="doneMessage" class="text-gray-500 mb-6"></p>
    <button id="btnDoneHome" class="bg-green-600 text-white px-8 py-4 rounded-xl font-bold text-lg">На головну</button>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let state = {
  currentTk: null,       // sheet name
  tkRows: [],            // full structure from LocalStorage
  currentStep: 1,
  stepGroups: {},        // { stepNum: [rows] }
  userInputs: {},        // { key: value }
  eDisplayMap: {},       // { rowIndex: displayValue }
  stepList: [],          // sorted unique step numbers
};

// ═══════════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');

function showLoader(msg) {
  $('loader').querySelector('p').textContent = msg || 'Зачекайте...';
  $('loader').classList.remove('hidden');
}
function hideLoader() { $('loader').classList.add('hidden'); }

function lsKey(tkName) { return 'tk_' + tkName.replace(/\s+/g, '_'); }

function saveToLS() {
  if (!state.currentTk) return;
  const data = {
    tkRows: state.tkRows,
    currentStep: state.currentStep,
    userInputs: state.userInputs,
    eDisplayMap: state.eDisplayMap,
  };
  localStorage.setItem(lsKey(state.currentTk), JSON.stringify(data));
}

function loadFromLS(tkName) {
  const raw = localStorage.getItem(lsKey(tkName));
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}

function clearLS(tkName) { localStorage.removeItem(lsKey(tkName)); }

// ── URL опублікованого Google Apps Script веб-додатку (тільки ЗАПИС) ─────────
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyy1IGqhfi3JDoFQ1Xqg7QiODC1Kb0QISkiZDosKtwcojtNvkvgnYn_oSI7yMRXlcVu/exec';

// GAS call wrapper — використовується ТІЛЬКИ для операцій запису
// (submitStepData, finishProcess), бо їх не можна робити публічним API-ключем.
async function gasCall(fn, args) {
  const res = await fetch(WEBAPP_URL, {
    method: 'POST',
    // text/plain уникає CORS preflight-запиту (OPTIONS),
    // який Apps Script веб-додатки не обробляють
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ fn, args: Array.isArray(args) ? args : [args] })
  });

  if (!res.ok) {
    throw new Error('Помилка мережі (GAS): ' + res.status);
  }

  return res.json();
}

// ═══════════════════════════════════════════════════════════════════
//  ЧИТАННЯ НАПРЯМУ ЧЕРЕЗ GOOGLE SHEETS API v4 (без навантаження на GAS)
// ═══════════════════════════════════════════════════════════════════
// Таблиця має бути доступна за посиланням на перегляд ("Anyone with the
// link — Viewer"). API-ключ треба обмежити (Application restrictions →
// HTTP referrers → домен GitHub Pages; API restrictions → Google Sheets API),
// щоб ним не могли скористатись сторонні.
const SPREADSHEET_ID = '1kkgWAkOmCIB1PzrZv5X4EtjnH0G8RI0NB1aNqMTxz3E';
const SHEETS_API_KEY = 'AIzaSyCuwPcMEX74Xi8FAgqmzCggEwY88p7UT7g';

async function sheetsApiFetch(path, params) {
  const url = new URL(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}${path}`);
  url.searchParams.set('key', SHEETS_API_KEY);
  Object.entries(params || {}).forEach(([k, v]) => {
    if (Array.isArray(v)) v.forEach(item => url.searchParams.append(k, item));
    else url.searchParams.set(k, v);
  });

  const res = await fetch(url.toString());
  const data = await res.json();
  if (!res.ok) {
    throw new Error('Sheets API: ' + (data.error?.message || res.status));
  }
  return data;
}

// ── Стартовий екран: список ТК-листів + їхній A1 (поточний крок) ─────────────
async function getStartData() {
  const meta = await sheetsApiFetch('', { fields: 'sheets.properties.title' });
  const tkNames = (meta.sheets || [])
    .map(s => s.properties.title)
    .filter(t => t.startsWith('ТК '));

  const allProcesses = [];
  const inProgress = [];

  if (tkNames.length === 0) return { allProcesses, inProgress };

  const ranges = tkNames.map(n => `'${n}'!A1`);
  const valuesData = await sheetsApiFetch('/values:batchGet', { ranges });

  (valuesData.valueRanges || []).forEach((vr, i) => {
    const name = tkNames[i];
    const val = vr.values?.[0]?.[0];
    if (val !== undefined && val !== '' && val !== 'Завершено' && Number(val) > 0) {
      inProgress.push({ name, currentStep: Number(val) });
    } else {
      allProcesses.push({ name });
    }
  });

  return { allProcesses, inProgress };
}

// ── Повна структура ТК: A2:H (значення) + окремо форматовані значення E ──────
async function loadTkStructure(sheetName) {
  const range = `'${sheetName}'!A1:H`;

  const [rawData, formattedData] = await Promise.all([
    sheetsApiFetch(`/values/${encodeURIComponent(range)}`, { valueRenderOption: 'UNFORMATTED_VALUE' }),
    sheetsApiFetch(`/values/${encodeURIComponent(range)}`, { valueRenderOption: 'FORMATTED_VALUE' })
  ]);

  const allRows = rawData.values || [];
  if (allRows.length < 2) return { rows: [], currentStep: 'Завершено' };

  const a1val = allRows[0][0];
  const currentStep = (a1val === 'Завершено' || a1val === undefined || a1val === '') ? 'Завершено' : Number(a1val);

  const dataRows = allRows.slice(1);
  const formattedRows = (formattedData.values || []).slice(1);

  const rows = dataRows.map((row, i) => ({
    step:     row[0],
    type:     row[1],
    label:    row[2],
    eValue:   row[3],
    eDisplay: formattedRows[i]?.[3] ?? '',
    action:   row[4],
    product:  row[5],
    unit:     row[6],
    rowIndex: i + 2
  }));

  return { rows, currentStep };
}

// ═══════════════════════════════════════════════════════════════════
//  START SCREEN
// ═══════════════════════════════════════════════════════════════════
async function loadStartScreen() {
  showLoader('Завантаження списку процесів...');
  $('headerTitle').textContent = 'Головне меню';
  hide('screenStep'); hide('screenDone'); show('screenStart');

  try {
    const data = await getStartData();
    renderStartScreen(data);
  } catch(e) {
    alert('Помилка завантаження: ' + e.message);
  } finally { hideLoader(); }
}

function renderStartScreen({ allProcesses, inProgress }) {
  // In-progress
  const ipSection = $('inProgressSection');
  const ipList = $('inProgressList');
  ipList.innerHTML = '';
  if (inProgress.length > 0) {
    show('inProgressSection');
    inProgress.forEach(p => {
      ipList.appendChild(makeProcessCard(p.name, true, p.currentStep));
    });
  } else {
    hide('inProgressSection');
  }

  // All
  const allList = $('allProcessesList');
  allList.innerHTML = '';
  allProcesses.forEach(p => {
    allList.appendChild(makeProcessCard(p.name, false));
  });
}

function makeProcessCard(name, inProgress, currentStep) {
  const div = document.createElement('div');
  div.className = 'bg-white rounded-2xl shadow p-4 flex items-center justify-between gap-3';
  div.innerHTML = `
    <div>
      <p class="font-bold text-gray-800 text-base">${name.replace('ТК ', '')}</p>
      ${inProgress ? `<p class="text-xs text-orange-500 mt-0.5">Крок ${currentStep} — не завершено</p>` : ''}
    </div>
    <button class="px-5 py-3 rounded-xl font-bold text-white text-sm shadow active:scale-95 transition-transform
      ${inProgress ? 'bg-orange-500' : 'bg-green-600'}">
      ${inProgress ? 'Продовжити' : 'Розпочати'}
    </button>`;
  div.querySelector('button').onclick = () => startProcess(name, inProgress);
  return div;
}

// ═══════════════════════════════════════════════════════════════════
//  PROCESS START
// ═══════════════════════════════════════════════════════════════════
async function startProcess(tkName, resume) {
  state.currentTk = tkName;
  $('headerTitle').textContent = tkName.replace('ТК ', '');

  const cached = loadFromLS(tkName);

  // Нове або відновлення — завжди завантажуємо з таблиці,
  // бо A1 (currentStep) є єдиним достовірним джерелом поточного кроку
  showLoader('Завантаження технологічної карти...');
  try {
    const result = await loadTkStructure(tkName);
    if (result.error) { alert(result.error); return; }

    state.tkRows = result.rows;
    // currentStep ЗАВЖДИ береться з таблиці (A1), не з кешу
    state.currentStep = (result.currentStep === 'Завершено' || !result.currentStep) ? 1 : result.currentStep;

    if (resume && cached && cached.tkRows && cached.tkRows.length > 0) {
      // При відновленні беремо userInputs та eDisplayMap з кешу,
      // але крок вже встановлено вище з таблиці
      state.userInputs = cached.userInputs || {};
      state.eDisplayMap = cached.eDisplayMap || {};
    } else {
      state.userInputs = {};
      // Заповнюємо eDisplayMap з завантаженої структури
      state.eDisplayMap = {};
      result.rows.forEach(row => {
        state.eDisplayMap[row.rowIndex] = row.eDisplay;
      });
    }

    // Для INPUT_NUMBER_not_cleaned — встановлюємо дефолти в userInputs
    result.rows.forEach(row => {
      if (row.type === 'INPUT_NUMBER_not_cleaned' && row.eDisplay !== '') {
        state.userInputs[row.rowIndex] = row.eDisplay;
      }
    });

    buildStepGroups();
    saveToLS();
    renderStep(state.currentStep);
    hide('screenStart'); show('screenStep');
  } catch(e) {
    alert('Помилка: ' + e.message);
  } finally { hideLoader(); }
}

// ═══════════════════════════════════════════════════════════════════
//  STEP GROUPS
// ═══════════════════════════════════════════════════════════════════
function buildStepGroups() {
  state.stepGroups = {};
  state.tkRows.forEach(row => {
    if (!row.step) return;
    if (!state.stepGroups[row.step]) state.stepGroups[row.step] = [];
    state.stepGroups[row.step].push(row);
  });
  state.stepList = Object.keys(state.stepGroups).map(Number).sort((a,b) => a-b);
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER STEP
// ═══════════════════════════════════════════════════════════════════
function renderStep(stepNum) {
  state.currentStep = stepNum;
  const rows = state.stepGroups[stepNum] || [];

  // Progress bar
  const bar = $('stepProgressBar');
  bar.innerHTML = '';
  state.stepList.forEach(s => {
    const dot = document.createElement('div');
    const isCurrent = s == stepNum;
    const isPast = s < stepNum;
    dot.className = `step-badge rounded-full flex items-center justify-center text-xs font-bold border-2
      ${isCurrent ? 'bg-green-600 border-green-600 text-white' : isPast ? 'bg-green-200 border-green-400 text-green-700' : 'bg-gray-100 border-gray-300 text-gray-400'}`;
    dot.textContent = s;
    bar.appendChild(dot);
  });

  // Content
  const content = $('stepContent');
  content.innerHTML = '';

  rows.forEach(row => {
    const el = renderRow(row);
    if (el) content.appendChild(el);
  });

  // Buttons
  const isFirst = stepNum === state.stepList[0];
  $('btnBack').classList.toggle('hidden', isFirst);
  $('btnNext').textContent = getNextButtonLabel(rows);
  $('btnNext').disabled = false;
  $('btnNext').classList.remove('opacity-40', 'cursor-not-allowed');
  // Перевіряємо блокуючі елементи (CHECK / TIMER / SELECT)
  updateNextButton();
}

function getNextButtonLabel(rows) {
  const btn = rows.find(r => r.type === 'BUTTON' || r.type === 'BUTTON_END');
  return btn ? btn.label : 'Далі →';
}

function renderRow(row) {
  switch (row.type) {
    case 'INFO_TITLE': {
      const div = document.createElement('div');
      div.className = 'bg-blue-50 border-l-4 border-blue-500 px-4 py-3 rounded-xl';
      div.innerHTML = `<p class="font-bold text-blue-800 text-lg">${row.label}</p>`;
      return div;
    }
    case 'INFO': {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-2xl shadow-sm px-4 py-3 flex justify-between items-center';
      const val = state.eDisplayMap[row.rowIndex] ?? '';
      const hasVal = val !== '' && val !== '0';
      div.innerHTML = `
        <p class="text-gray-600 text-sm flex-1 pr-3">${row.label}</p>
        <span class="font-bold text-gray-900 text-base whitespace-nowrap ${hasVal ? 'text-green-700' : 'text-gray-300'}">
          ${hasVal ? val + (row.unit ? ' ' + row.unit : '') : '—'}
        </span>`;
      return div;
    }
    case 'INPUT_NUMBER':
    case 'INPUT_NUMBER_not_cleaned': {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-2xl shadow px-4 py-4';
      const savedVal = state.userInputs[row.rowIndex] ?? (row.type === 'INPUT_NUMBER_not_cleaned' ? (state.eDisplayMap[row.rowIndex] ?? '') : '');
      div.innerHTML = `
        <label class="block text-gray-700 font-semibold mb-2 text-base">${row.label}${row.unit ? ' <span class="text-sm text-gray-400 font-normal">(${row.unit})</span>' : ''}</label>
        <input
          type="number"
          inputmode="decimal"
          class="w-full border-2 border-blue-300 focus:border-blue-600 rounded-xl px-4 py-4 text-2xl font-bold text-blue-800 bg-blue-50 outline-none"
          data-rowindex="${row.rowIndex}"
          data-type="${row.type}"
          value="${savedVal}"
          placeholder="0"
        />`;
      div.querySelector('input').addEventListener('input', e => {
        state.userInputs[row.rowIndex] = e.target.value;
      });
      return div;
    }
    // ── INFO_TEXT: звичайний текстовий абзац ──────────────────────────────────
    case 'INFO_TEXT': {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-2xl shadow-sm px-4 py-3';
      div.innerHTML = `<p class="text-gray-700 text-sm leading-relaxed">${row.label}</p>`;
      return div;
    }

    // ── INFO_PROCESS: великий текст по центру з пульсуючою анімацією ──────────
    case 'INFO_PROCESS': {
      const div = document.createElement('div');
      div.className = 'bg-gradient-to-b from-green-50 to-white rounded-2xl shadow px-6 py-10 flex flex-col items-center justify-center text-center gap-4';
      div.innerHTML = `
        <div class="info-process-spinner w-16 h-16 rounded-full border-4 border-green-200 border-t-green-600"></div>
        <p class="text-green-800 font-bold text-xl leading-snug">${row.label}</p>
        ${row.unit ? `<p class="text-gray-400 text-sm">${row.unit}</p>` : ''}`;
      return div;
    }

    // ── INFO_WARN: попередження жовтим блоком ──────────────────────────────────
    case 'INFO_WARN': {
      const div = document.createElement('div');
      div.className = 'bg-amber-50 border-l-4 border-amber-400 rounded-xl px-4 py-3 flex gap-3 items-start';
      div.innerHTML = `
        <span class="text-2xl leading-none mt-0.5">&#x26A0;&#xFE0F;</span>
        <p class="text-amber-900 font-semibold text-sm leading-relaxed">${row.label}</p>`;
      return div;
    }

    // ── INFO_CHECK: чекліст — блокує «Далі» поки всі не відмічені ────────────
    case 'INFO_CHECK': {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-2xl shadow px-4 py-4';
      const checkId = 'chk_' + row.rowIndex;
      const isChecked = !!state.userInputs['chk_' + row.rowIndex];
      div.innerHTML = `
        <label class="flex items-start gap-3 cursor-pointer select-none" for="${checkId}">
          <input type="checkbox" id="${checkId}" data-check data-rowindex="${row.rowIndex}"
            class="sr-only" ${isChecked ? 'checked' : ''}>
          <div class="chk-box w-6 h-6 flex-shrink-0 mt-0.5 rounded-lg border-2 flex items-center justify-center transition-all
            ${isChecked ? 'bg-green-600 border-green-600' : 'border-gray-300'}">
            <svg class="w-4 h-4 text-white ${isChecked ? '' : 'hidden'}" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="text-gray-800 font-medium text-base leading-snug">${row.label}</span>
        </label>`;
      const inp = div.querySelector('input[type=checkbox]');
      const box = div.querySelector('.chk-box');
      const tick = box.querySelector('svg');
      function updateBox() {
        state.userInputs['chk_' + row.rowIndex] = inp.checked;
        if (inp.checked) {
          box.classList.add('bg-green-600', 'border-green-600');
          box.classList.remove('border-gray-300');
          tick.classList.remove('hidden');
        } else {
          box.classList.remove('bg-green-600', 'border-green-600');
          box.classList.add('border-gray-300');
          tick.classList.add('hidden');
        }
        updateNextButton();
      }
      inp.addEventListener('change', updateBox);
      return div;
    }

    // ── TIMER: таймер зворотного відліку, блокує «Далі» до завершення ────────
    // Час в секундах береться з колонки D (eDisplay / eValue)
    case 'TIMER': {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-2xl shadow px-4 py-6 flex flex-col items-center gap-3';
      const totalSec = Number(String(row.eDisplay || row.eValue || '0').replace(',', '.')) || 0;
      div.innerHTML = `
        <p class="text-gray-600 font-semibold text-base text-center">${row.label}</p>
        <div class="relative w-28 h-28">
          <svg class="w-full h-full" style="transform:rotate(-90deg)" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="44" fill="none" stroke="#e5e7eb" stroke-width="8"/>
            <circle id="timerArc_${row.rowIndex}" cx="50" cy="50" r="44" fill="none" stroke="#16a34a" stroke-width="8"
              stroke-dasharray="276.46" stroke-dashoffset="0" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
            <span id="timerDisplay_${row.rowIndex}" class="text-2xl font-bold text-gray-800">${formatTime(totalSec)}</span>
          </div>
        </div>
        <button id="timerBtn_${row.rowIndex}"
          class="px-6 py-2 rounded-xl font-bold text-sm bg-green-600 text-white active:scale-95 transition-transform shadow">
          &#x25B6; Старт
        </button>`;

      requestAnimationFrame(() => {
        const display = document.getElementById('timerDisplay_' + row.rowIndex);
        const arc = document.getElementById('timerArc_' + row.rowIndex);
        const btn = document.getElementById('timerBtn_' + row.rowIndex);
        if (!display || !arc || !btn) return;
        const circumference = 276.46;
        let remaining = (state.timers && state.timers[row.rowIndex] != null) ? state.timers[row.rowIndex] : totalSec;
        let intervalId = null;
        function tick() {
          if (remaining <= 0) {
            clearInterval(intervalId);
            display.textContent = '00:00';
            arc.style.strokeDashoffset = circumference;
            arc.style.stroke = '#bbf7d0';
            btn.textContent = '\u2705 Готово';
            btn.disabled = true;
            btn.className = 'px-6 py-2 rounded-xl font-bold text-sm bg-gray-200 text-gray-400 cursor-default';
            if (!state.timers) state.timers = {};
            state.timers[row.rowIndex] = 0;
            updateNextButton();
            return;
          }
          display.textContent = formatTime(remaining);
          arc.style.strokeDashoffset = String(circumference * (1 - remaining / totalSec));
          if (!state.timers) state.timers = {};
          state.timers[row.rowIndex] = remaining;
          remaining--;
        }
        if (remaining <= 0) { remaining = 0; tick(); }
        else {
          tick();
          btn.addEventListener('click', function() {
            if (intervalId) {
              clearInterval(intervalId); intervalId = null;
              btn.textContent = '\u25B6 Продовжити';
            } else {
              intervalId = setInterval(tick, 1000);
              btn.textContent = '\u23F8 Пауза';
            }
          });
        }
      });
      return div;
    }

    // ── INPUT_TEXT: текстове поле ─────────────────────────────────────────────
    case 'INPUT_TEXT': {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-2xl shadow px-4 py-4';
      const savedVal = state.userInputs[row.rowIndex] || '';
      div.innerHTML = `
        <label class="block text-gray-700 font-semibold mb-2 text-base">${row.label}</label>
        <textarea rows="2"
          class="w-full border-2 border-blue-300 focus:border-blue-600 rounded-xl px-4 py-3 text-base text-gray-800 bg-blue-50 outline-none resize-none"
          data-rowindex="${row.rowIndex}" data-type="INPUT_TEXT"
          placeholder="Введіть текст...">${savedVal}</textarea>`;
      div.querySelector('textarea').addEventListener('input', function(e) {
        state.userInputs[row.rowIndex] = e.target.value;
      });
      return div;
    }

    // ── SELECT: випадаючий список, варіанти з колонки D через «;» ─────────────
    case 'SELECT': {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-2xl shadow px-4 py-4';
      const raw = String(row.eDisplay || row.eValue || '');
      const options = raw.split(';').map(function(s) { return s.trim(); }).filter(Boolean);
      const savedVal = state.userInputs[row.rowIndex] || '';
      const optionsHtml = options.map(function(o) {
        return '<option value="' + o + '"' + (o === savedVal ? ' selected' : '') + '>' + o + '</option>';
      }).join('');
      div.innerHTML = `
        <label class="block text-gray-700 font-semibold mb-2 text-base">${row.label}</label>
        <div class="relative">
          <select data-rowindex="${row.rowIndex}" data-type="SELECT"
            class="w-full border-2 border-blue-300 focus:border-blue-600 rounded-xl px-4 py-3 text-base text-gray-800 bg-blue-50 outline-none appearance-none pr-10">
            <option value="" disabled ${!savedVal ? 'selected' : ''}>&mdash; Оберіть варіант &mdash;</option>
            ${optionsHtml}
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-400">&#x25BC;</div>
        </div>`;
      div.querySelector('select').addEventListener('change', function(e) {
        state.userInputs[row.rowIndex] = e.target.value;
        updateNextButton();
      });
      return div;
    }

    case 'BUTTON':
    case 'BUTTON_END':
      return null; // handled by footer buttons
    default:
      return null;
  }
}

// ── Допоміжна: форматування секунд -> MM:SS ───────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

// ── Перевірка стану кнопки «Далі» (чекліст + таймери + SELECT) ───────────────
function updateNextButton() {
  const btn = document.getElementById('btnNext');
  if (!btn) return;

  // INFO_CHECK: всі чекбокси мають бути відмічені
  const checkboxes = document.querySelectorAll('#stepContent input[data-check]');
  const allChecked = Array.from(checkboxes).every(function(c) { return c.checked; });

  // TIMER: всі таймери мають добігти 0
  const rows = state.stepGroups[state.currentStep] || [];
  const timerRows = rows.filter(function(r) { return r.type === 'TIMER'; });
  const allTimersDone = timerRows.every(function(r) {
    return state.timers && state.timers[r.rowIndex] === 0;
  });

  // SELECT: всі select мають мати вибране значення
  const selects = document.querySelectorAll('#stepContent select[data-type=SELECT]');
  const allSelected = Array.from(selects).every(function(s) { return s.value !== ''; });

  const canProceed = allChecked && allTimersDone && allSelected;
  btn.disabled = !canProceed;
  btn.classList.toggle('opacity-40', !canProceed);
  btn.classList.toggle('cursor-not-allowed', !canProceed);
}

// ═══════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════
$('btnBack').onclick = () => {
  const idx = state.stepList.indexOf(state.currentStep);
  if (idx > 0) {
    renderStep(state.stepList[idx - 1]);
    saveToLS();
    window.scrollTo(0, 0);
  }
};

$('btnNext').onclick = async () => {
  const rows = state.stepGroups[state.currentStep] || [];
  const isEnd = rows.some(r => r.type === 'BUTTON_END');
  const idx = state.stepList.indexOf(state.currentStep);
  const nextStep = state.stepList[idx + 1];

  // Валідація і збір INPUT_NUMBER
  const inputs = [];
  let valid = true;
  document.querySelectorAll('#stepContent input[type=number]').forEach(inp => {
    const val = inp.value.trim();
    if (val === '') { valid = false; inp.focus(); inp.classList.add('border-red-500'); return; }
    inp.classList.remove('border-red-500');
    inputs.push({ rowIndex: Number(inp.dataset.rowindex), value: Number(val) });
  });
  if (!valid) { alert('Будь ласка, заповніть всі числові поля!'); return; }

  // Збираємо INPUT_TEXT
  document.querySelectorAll('#stepContent textarea[data-type=INPUT_TEXT]').forEach(function(ta) {
    inputs.push({ rowIndex: Number(ta.dataset.rowindex), value: ta.value });
  });

  // Збираємо SELECT
  document.querySelectorAll('#stepContent select[data-type=SELECT]').forEach(function(sel) {
    inputs.push({ rowIndex: Number(sel.dataset.rowindex), value: sel.value });
  });

  // Збираємо payload для GAS
  const gasInputs = inputs.map(i => ({ rowIndex: i.rowIndex, value: i.value }));

  if (isEnd) {
    // Крок з BUTTON_END — спочатку записуємо дані, потім фінал
    showLoader('Завершення процесу...');
    try {
      if (gasInputs.length > 0) {
        await gasCall('submitStepData', [state.currentTk, gasInputs, 'Завершено']);
      }
      const result = await gasCall('finishProcess', [state.currentTk]);
      if (result.error) { alert(result.error); return; }
      clearLS(state.currentTk);
      showDoneScreen();
    } catch(e) { alert('Помилка: ' + e.message); }
    finally { hideLoader(); }
    return;
  }

  // Звичайний крок з BUTTON
  showLoader('Збереження даних...');
  try {
    const result = await gasCall('submitStepData', [state.currentTk, gasInputs, nextStep]);
    if (result.error) { alert(result.error); return; }

    // Оновлюємо eDisplayMap
    if (result.eDisplayValues) {
      result.eDisplayValues.forEach(item => {
        state.eDisplayMap[item.rowIndex] = item.eDisplay;
      });
    }

    saveToLS();
    renderStep(nextStep);
    window.scrollTo(0, 0);
  } catch(e) { alert('Помилка: ' + e.message); }
  finally { hideLoader(); }
};

// ═══════════════════════════════════════════════════════════════════
//  DONE SCREEN
// ═══════════════════════════════════════════════════════════════════
function showDoneScreen() {
  hide('screenStep');
  hide('screenStart');
  show('screenDone');
  $('doneMessage').textContent = `Технологічну карту "${state.currentTk.replace('ТК ', '')}" успішно завершено. Склад і журнал оновлено.`;
}

$('btnDoneHome').onclick = loadStartScreen;
$('btnHome').onclick = loadStartScreen;

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
window.onload = loadStartScreen;
</script>
